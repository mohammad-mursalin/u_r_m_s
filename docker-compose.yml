version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: db
    environment:
      POSTGRES_DB: routine_db
      POSTGRES_USER: routine_user
      POSTGRES_PASSWORD: routine_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: backend
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend
    container_name: frontend
    command: npm run dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    environment:
      - VITE_API_BASE_URL=http://localhost:8000

volumes:
  postgres_data:
